<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <meta name="description" content="{{META_DESCRIPTION}}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;600;700&family=Red+Hat+Text:wght@400;500;700&family=Red+Hat+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Red Hat Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 18px;
      line-height: 1.7;
      color: #151515;
      background: #FFFFFF;
      -webkit-font-smoothing: antialiased;
    }

    /* --- Top banner --- */
    .rh-banner {
      background: #151515;
      padding: 12px 0;
      border-bottom: 3px solid #EE0000;
    }
    .rh-banner-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .rh-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .rh-logo svg {
      height: 28px;
      width: auto;
    }
    .rh-nav {
      display: flex;
      gap: 20px;
    }
    .rh-nav a {
      color: #FFFFFF;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    /* --- Blog breadcrumb bar --- */
    .blog-bar {
      background: #F0F0F0;
      border-bottom: 1px solid #D2D2D2;
      padding: 14px 0;
    }
    .blog-bar-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #6A6E73;
    }
    .blog-bar-inner a {
      color: #0066CC;
      text-decoration: none;
    }
    .blog-bar-inner a:hover {
      text-decoration: underline;
    }
    .blog-bar-inner .sep {
      color: #B8BBBE;
    }

    /* --- Hero section --- */
    .hero {
      background: linear-gradient(135deg, #151515 0%, #292929 60%, #3F0000 100%);
      padding: 80px 0 72px;
      position: relative;
      overflow: hidden;
    }
    .hero::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 40%;
      height: 100%;
      background: linear-gradient(180deg, rgba(238, 0, 0, 0.08) 0%, rgba(238, 0, 0, 0.02) 100%);
      pointer-events: none;
    }
    .hero-inner {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 1;
    }
    .hero-label {
      display: inline-block;
      background: #EE0000;
      color: #FFFFFF;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 2px;
      margin-bottom: 24px;
    }
    .hero h1 {
      font-family: 'Red Hat Display', sans-serif;
      font-size: 42px;
      font-weight: 700;
      line-height: 1.15;
      color: #FFFFFF;
      margin-bottom: 20px;
      letter-spacing: -0.01em;
    }
    .hero .subtitle {
      font-family: 'Red Hat Text', sans-serif;
      font-size: 20px;
      font-weight: 400;
      color: #B8BBBE;
      line-height: 1.5;
      margin-bottom: 32px;
    }
    .hero-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      color: #A3A3A3;
      font-size: 14px;
    }
    .hero-meta .author {
      color: #FFFFFF;
      font-weight: 500;
    }
    .hero-meta .dot {
      color: #6A6E73;
    }

    /* --- Article body --- */
    .article-wrap {
      max-width: 800px;
      margin: 0 auto;
      padding: 56px 24px 80px;
    }

    .article-wrap p {
      margin-bottom: 24px;
    }

    .article-wrap a {
      color: #0066CC;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s;
    }
    .article-wrap a:hover {
      border-bottom-color: #0066CC;
    }

    .article-wrap strong a {
      font-weight: 700;
    }

    /* CTA links */
    .cta-link {
      color: #0066CC;
      font-weight: 700;
    }

    .article-wrap h2 {
      font-family: 'Red Hat Display', sans-serif;
      font-size: 28px;
      font-weight: 600;
      line-height: 1.25;
      color: #151515;
      margin-top: 48px;
      margin-bottom: 20px;
      padding-top: 8px;
      border-top: 2px solid #F0F0F0;
    }

    .article-wrap h2:first-of-type {
      margin-top: 40px;
    }

    .article-wrap h3 {
      font-family: 'Red Hat Display', sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: #151515;
      margin-top: 32px;
      margin-bottom: 12px;
    }

    .article-wrap ul, .article-wrap ol {
      margin-bottom: 24px;
      padding-left: 24px;
    }

    .article-wrap li {
      margin-bottom: 16px;
      padding-left: 4px;
    }

    .article-wrap li strong {
      color: #151515;
    }

    /* Tier/group section headers (bold lead-in paragraphs) */
    .tier-header {
      font-family: 'Red Hat Text', sans-serif;
      font-size: 18px;
      font-weight: 700;
      margin-top: 28px;
      margin-bottom: 12px;
      color: #151515;
    }

    /* Pull-quote / tagline callout */
    .tagline {
      font-size: 20px;
      font-weight: 500;
      color: #383838;
      margin-top: 32px;
      margin-bottom: 32px;
      padding: 20px 24px;
      border-left: 4px solid #EE0000;
      background: #FEF0F0;
      line-height: 1.5;
    }

    /* --- Image placeholders --- */
    .image-placeholder {
      margin: 40px 0;
      background: #F0F0F0;
      border: 2px dashed #D2D2D2;
      border-radius: 8px;
      padding: 48px 32px;
      text-align: center;
    }
    .image-placeholder .ph-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: #E0E0E0;
      border-radius: 50%;
      margin-bottom: 16px;
    }
    .image-placeholder .ph-icon svg {
      width: 28px;
      height: 28px;
      fill: #6A6E73;
    }
    .image-placeholder .ph-title {
      font-family: 'Red Hat Display', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: #383838;
      margin-bottom: 8px;
    }
    .image-placeholder .ph-alt {
      font-size: 14px;
      color: #6A6E73;
      line-height: 1.5;
      max-width: 560px;
      margin: 0 auto;
      font-style: italic;
    }

    /* --- Actual images (when placeholders are replaced) --- */
    .article-wrap img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin: 40px 0;
    }
    .article-wrap figure {
      margin: 40px 0;
    }
    .article-wrap figure img {
      margin: 0;
    }
    .article-wrap figcaption {
      font-size: 14px;
      color: #6A6E73;
      margin-top: 8px;
      font-style: italic;
    }

    /* --- Multi-column diagram (e.g., tier comparison) --- */
    .tier-diagram {
      margin: 40px 0;
      border: 1px solid #D2D2D2;
      border-radius: 8px;
      overflow: hidden;
    }
    .tier-diagram-title {
      font-family: 'Red Hat Display', sans-serif;
      font-size: 20px;
      font-weight: 600;
      text-align: center;
      padding: 20px;
      background: #FFFFFF;
      border-bottom: 1px solid #D2D2D2;
      color: #151515;
    }
    .tier-columns {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }
    .tier-col {
      border-right: 1px solid #D2D2D2;
    }
    .tier-col:last-child {
      border-right: none;
    }
    .tier-col-header {
      padding: 12px 16px;
      font-family: 'Red Hat Display', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #FFFFFF;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      text-align: center;
    }
    /* Column header color variants */
    .tier-col-header.rh       { background: #EE0000; }
    .tier-col-header.partner  { background: #0066CC; }
    .tier-col-header.community{ background: #3D7317; }
    .tier-col-header.neutral  { background: #6A6E73; }
    .tier-col-item {
      padding: 12px 16px;
      font-size: 15px;
      text-align: center;
      border-top: 1px solid #F0F0F0;
      color: #383838;
    }

    /* --- Series / info callout --- */
    .series-callout {
      margin-top: 48px;
      padding: 20px 24px;
      background: #E0F0FF;
      border-left: 4px solid #0066CC;
      border-radius: 0 4px 4px 0;
      font-size: 16px;
      color: #003366;
      line-height: 1.6;
    }

    /* --- Code blocks (if needed) --- */
    .article-wrap pre {
      background: #1E1E1E;
      color: #D4D4D4;
      font-family: 'Red Hat Mono', 'Consolas', monospace;
      font-size: 14px;
      line-height: 1.6;
      padding: 24px;
      border-radius: 8px;
      overflow-x: auto;
      margin-bottom: 24px;
    }
    .article-wrap code {
      font-family: 'Red Hat Mono', 'Consolas', monospace;
      font-size: 15px;
      background: #F0F0F0;
      padding: 2px 6px;
      border-radius: 3px;
    }
    .article-wrap pre code {
      background: none;
      padding: 0;
      font-size: 14px;
    }

    /* --- Footer --- */
    .rh-footer {
      background: #151515;
      padding: 40px 0;
      margin-top: 0;
    }
    .rh-footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .rh-footer-text {
      color: #6A6E73;
      font-size: 13px;
    }
    .rh-footer-links {
      display: flex;
      gap: 24px;
    }
    .rh-footer-links a {
      color: #A3A3A3;
      text-decoration: none;
      font-size: 13px;
    }

    /* --- Responsive --- */
    @media (max-width: 768px) {
      .hero h1 {
        font-size: 30px;
      }
      .hero .subtitle {
        font-size: 17px;
      }
      .article-wrap {
        padding: 40px 20px 60px;
      }
      .article-wrap h2 {
        font-size: 24px;
      }
      .tier-columns {
        grid-template-columns: 1fr;
      }
      .tier-col {
        border-right: none;
        border-bottom: 1px solid #D2D2D2;
      }
      .tier-col:last-child {
        border-bottom: none;
      }
    }
  </style>
</head>
<body>

  <!-- Top banner -->
  <header class="rh-banner">
    <div class="rh-banner-inner">
      <div class="rh-logo">
        <svg viewBox="0 0 613 145" xmlns="http://www.w3.org/2000/svg">
          <path d="M127.47 83.49c12.51 0 30.61-2.58 30.61-17.46a14 14 0 0 0-.31-3.42l-7.45-32.36c-1.72-7.12-3.23-10.35-15.73-16.6C124.89 8.69 103.76.5 97.51.5 91.69.5 90 8 83.06 8c-6.68 0-11.64-5.6-17.89-5.6-6 0-9.91 4.09-12.93 12.5 0 0-8.41 23.72-9.49 27.16a6.43 6.43 0 0 0-.22 1.94c0 9.22 36.3 39.45 84.94 39.45M127.47 83.49c-12.51 0-30.61 2.58-30.61 17.46a14 14 0 0 0 .31 3.42l7.45 32.36c1.72 7.12 3.23 10.35 15.73 16.6 9.7 4.96 30.83 13.15 37.08 13.15 5.82 0 7.51-7.5 14.45-7.5 6.68 0 11.64 5.6 17.89 5.6 6 0 9.91-4.09 12.93-12.5 0 0 8.41-23.72 9.49-27.16a6.43 6.43 0 0 0 .22-1.94c0-9.22-36.3-39.45-84.94-39.45" fill="#EE0000"/>
          <text x="220" y="95" font-family="Red Hat Display, sans-serif" font-weight="700" font-size="72" fill="#FFFFFF">Red Hat</text>
        </svg>
      </div>
      <nav class="rh-nav">
        <a href="#">Products</a>
        <a href="#">Solutions</a>
        <a href="#">Training</a>
        <a href="#">Blog</a>
      </nav>
    </div>
  </header>

  <!-- Breadcrumb bar -->
  <div class="blog-bar">
    <div class="blog-bar-inner">
      {{BREADCRUMBS}}
    </div>
  </div>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-inner">
      <span class="hero-label">{{PRODUCT_LABEL}}</span>
      <h1>{{TITLE}}</h1>
      <p class="subtitle">{{SUBTITLE}}</p>
      <div class="hero-meta">
        <span class="author">{{AUTHOR}}</span>
        <span class="dot">&middot;</span>
        <span>{{DATE}}</span>
        <span class="dot">&middot;</span>
        <span>{{READ_TIME}}</span>
      </div>
    </div>
  </section>

  <!-- Article -->
  <article class="article-wrap">
    {{BODY_CONTENT}}
  </article>

  <!-- Footer -->
  <footer class="rh-footer">
    <div class="rh-footer-inner">
      <div class="rh-footer-text">&copy; {{YEAR}} Red Hat, Inc.</div>
      <div class="rh-footer-links">
        <a href="#">Privacy statement</a>
        <a href="#">Terms of use</a>
        <a href="#">Cookie preferences</a>
      </div>
    </div>
  </footer>

</body>
</html>
