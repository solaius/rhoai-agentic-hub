# The feature routing table. One entry per feature partition.
# hub.file appends here when creating a partition. features/index.md is
# generated from this file.
features:
- id: skills-registry
  title: Skills Registry
  description: RHOAI skills registry work — upstream MLflow collaboration, ODH plugin marketplace
- id: mcp-gateway
  title: MCP Gateway
  description: Runtime MCP traffic governance — Envoy/RHCL gateway, roadmap, and entitlement model.
- id: mcp-registry
  title: MCP Registry
  description: The governance/system-of-record layer for MCP servers — lifecycle, data model, and the deployment-time Lifecycle Operator.
  jira:
    jql: '(project = RHOAIENG AND component = "AI Hub" AND (summary ~ "\"MCP Registry\"" OR summary ~ "mcp-registry")) OR (project = RHAISTRAT AND summary ~ "\"MCP Registry\"")'
    ref_types: [Outcome, Feature]
- id: mcp-ecosystem
  title: MCP Ecosystem
  description: MCP server building, partner/community onboarding pipeline, evaluation, and ecosystem tooling.
- id: mcp-catalog
  title: MCP Catalog
  description: The MCP server storefront in RHOAI — discover and deploy RH, partner, community, and approved enterprise MCP servers; AI Hub surface and release train (DP 3.4 → TP/GA 3.6).
- id: agent-registry
  title: Agent Registry
  description: Post-deployment agent registry, agent catalog/starter kits, agentic base images, and Kagenti lifecycle management.
- id: platform
  title: Platform
  description: Platform components and org reference — AI Gateway, AI Hub UI, releases/SKUs, people, personas, org process. Story/strategy content lives in /narrative/.
- id: agent-memory
  title: Agent Memory
  description: Agent memory/knowledge research, proposals (Feast, MemoryHub, OGX), and the RHAISTRAT-1345 outcome.
- id: agent-ops
  title: Agent Ops
  description: Agent operations — observability, SDLC oversight, AgentOps positioning and talk tracks.
- id: gen-ai-studio
  title: Gen AI Studio
  description: Prompt/agent iteration studio — playground UX, usability research, studio integration.
- id: agent-interop
  title: Agent Interop
  description: Agent interoperability — sandboxing (OpenShell), identity (SPIFFE/SPIRE), A2A communication, agent cards, BYO agent onboarding, discovery, and declarative harness configuration.
  jira:
    jql: '(project = RHOAIENG AND component = "AgentOps") OR (project IN (RHOAIENG, RHAISTRAT) AND labels IN (agentic, agentic-theme))'
    ref_types: [Outcome, Feature]
